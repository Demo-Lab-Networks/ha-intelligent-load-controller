name: HACS and Hassfest

on:
  pull_request:
  push:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate HACS integration package
        uses: hacs/action@main
        with:
          category: integration
          # These are GitHub/community-listing prerequisites, not package checks.
          # Root brand assets are validated in-repo and should not be ignored.
          ignore: description images information issues topics
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate Home Assistant custom integration conventions
        uses: home-assistant/actions/hassfest@master
